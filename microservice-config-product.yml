spring:
  profiles:
    active: dev #激活开发环境配置
---
server:
  port: 8001

mybatis:
  config-location: classpath:mybatis/mybatis.cfg.xml
  type-aliases-package: com.miguan.springcloud.entities
  mapper-locations: classpath:mybatis/mapper/**/*.xml

spring:
  profiles: dev #开发环境
  application:
    name: microservice-product-config-444
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://eureka6001.com:3306/springcloud_db01?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=UTF-8&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: WenXianYu@123
    dbcp2:
      min-idle: 5
      initial-size: 5
      max-total: 5
      max-wait-millis: 150

eureka:
  client:
    registerWithEureka: true  #服务注册开关
    fetchRegistry: true  #服务发现开关
    serviceUrl:
      #defaultZone: http://localhost:6001/eureka #注册到哪一个eureka server 服务注册中心
      defaultZone: http://localhost:6001/eureka,http://localhost:6002/eureka #注册到哪一个eureka server 服务注册中心
  instance:
    instanceId: ${spring.application.name}:${server.port}-bus
    prefer-ip-address: true #访问路径就会显示ip地址
